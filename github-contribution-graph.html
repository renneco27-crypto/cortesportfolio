<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Contribution Graph</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --text: #c9d1d9;
    --muted: #8b949e;
    --border: #30363d;
    --l0: #161b22;
    --l1: #0e4429;
    --l2: #006d32;
    --l3: #26a641;
    --l4: #39d353;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header h2 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }
  .header .updated {
    font-size: 12px;
    color: var(--muted);
  }
  .scroll-wrap {
    overflow-x: auto;
  }
  .months {
    display: flex;
    font-size: 12px;
    color: var(--muted);
    margin-left: 30px;
    margin-bottom: 4px;
  }
  .month-label {
    flex-shrink: 0;
  }
  .grid-area {
    display: flex;
  }
  .day-labels {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    width: 26px;
    padding-right: 4px;
    padding-top: 14px;
  }
  .weeks {
    display: flex;
    gap: 3px;
  }
  .week {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .day {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    background: var(--l0);
    outline: 1px solid rgba(255,255,255,0.04);
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .legend .day { width: 11px; height: 11px; }
  .tooltip {
    position: fixed;
    background: #1c2128;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap;
    z-index: 10;
  }
  .status {
    font-size: 13px;
    color: var(--muted);
    padding: 20px 0;
    text-align: center;
  }
  .error {
    color: #f85149;
  }
  input#username-input {
    background: #0d1117;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 13px;
    width: 160px;
  }
  button#refresh-btn {
    background: #21262d;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  button#refresh-btn:hover {
    background: #30363d;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h2 id="contrib-title">GitHub contributions</h2>
    <div style="display:flex; gap:8px; align-items:center;">
      <input id="username-input" type="text" placeholder="GitHub username" value="renneco27-crypto">
      <button id="refresh-btn">Refresh</button>
    </div>
  </div>
  <div id="content">
    <div class="status">Loading contribution data…</div>
  </div>
  <div class="footer" id="footer" style="display:none;">
    <span id="updated-text"></span>
    <div class="legend">
      <span>Less</span>
      <div class="day" style="background:var(--l0)"></div>
      <div class="day" style="background:var(--l1)"></div>
      <div class="day" style="background:var(--l2)"></div>
      <div class="day" style="background:var(--l3)"></div>
      <div class="day" style="background:var(--l4)"></div>
      <span>More</span>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
/*
  Live GitHub contribution graph.

  DATA SOURCE:
  GitHub does not expose a public REST endpoint for contribution calendars.
  The reliable free way to get this data without a backend server is
  github-contributions-api.jogruber.de, which scrapes the public contribution
  graph GitHub already shows on your profile page and returns clean JSON.
  It's the same technique used by most "GitHub contribution embed" widgets.

  CACHING FOR "PER WEEK / REAL-TIME":
  Results are cached in localStorage with a timestamp. On load, if the cache
  is older than REFRESH_INTERVAL_MS, it refetches automatically. You can set
  this to as low as a few minutes ("near real-time") or as high as a week.
*/

const REFRESH_INTERVAL_MS = 60 * 60 * 1000; // 1 hour. Change to 7*24*60*60*1000 for weekly.
const CACHE_KEY_PREFIX = 'gh_contrib_cache_';

const contentEl = document.getElementById('content');
const footerEl = document.getElementById('footer');
const updatedTextEl = document.getElementById('updated-text');
const titleEl = document.getElementById('contrib-title');
const usernameInput = document.getElementById('username-input');
const refreshBtn = document.getElementById('refresh-btn');
const tooltip = document.getElementById('tooltip');

function levelForCount(count) {
  if (count === 0) return 0;
  if (count <= 2) return 1;
  if (count <= 5) return 2;
  if (count <= 9) return 3;
  return 4;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

async function fetchContributions(username, forceRefresh) {
  const cacheKey = CACHE_KEY_PREFIX + username.toLowerCase();
  const cached = localStorage.getItem(cacheKey);

  if (cached && !forceRefresh) {
    try {
      const parsed = JSON.parse(cached);
      const age = Date.now() - parsed.fetchedAt;
      if (age < REFRESH_INTERVAL_MS) {
        return { data: parsed.data, fromCache: true, fetchedAt: parsed.fetchedAt };
      }
    } catch (e) { /* fall through to refetch */ }
  }

  const url = `https://github-contributions-api.jogruber.de/v4/${encodeURIComponent(username)}?y=last`;
  const res = await fetch(url);
  if (!res.ok) {
    throw new Error(`Could not load data for "${username}" (status ${res.status})`);
  }
  const data = await res.json();
  if (!data || !data.contributions) {
    throw new Error('Unexpected response format from data source.');
  }

  localStorage.setItem(cacheKey, JSON.stringify({ data, fetchedAt: Date.now() }));
  return { data, fromCache: false, fetchedAt: Date.now() };
}

function buildWeeks(contributions) {
  // contributions: array of { date, count, level }
  const byDate = {};
  contributions.forEach(c => { byDate[c.date] = c; });

  const today = new Date();
  today.setHours(0,0,0,0);

  // Find the most recent Saturday (end of week) on/before today
  const end = new Date(today);
  const daysSinceSaturday = (end.getDay() + 1) % 7;
  end.setDate(end.getDate() + (6 - end.getDay()));

  // Start 52 weeks back from that, aligned to Sunday
  const start = new Date(end);
  start.setDate(start.getDate() - 7 * 52 - 6);
  // align to Sunday
  start.setDate(start.getDate() - start.getDay());

  const weeks = [];
  let cursor = new Date(start);
  let currentWeek = [];

  while (cursor <= today) {
    const iso = cursor.toISOString().slice(0, 10);
    const entry = byDate[iso];
    currentWeek.push({
      date: iso,
      count: entry ? entry.count : 0,
    });
    if (cursor.getDay() === 6) {
      weeks.push(currentWeek);
      currentWeek = [];
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  if (currentWeek.length) weeks.push(currentWeek);

  return weeks;
}

function monthLabelsForWeeks(weeks) {
  const labels = [];
  let lastMonth = -1;
  weeks.forEach((week, i) => {
    const firstDay = week[0];
    const d = new Date(firstDay.date + 'T00:00:00');
    const m = d.getMonth();
    if (m !== lastMonth) {
      labels.push({ index: i, text: d.toLocaleDateString(undefined, { month: 'short' }) });
      lastMonth = m;
    }
  });
  return labels;
}

function render(username, contributions, fetchedAt, fromCache) {
  titleEl.textContent = `${username}'s GitHub contributions`;

  const weeks = buildWeeks(contributions);
  const months = monthLabelsForWeeks(weeks);
  const total = contributions.reduce((sum, c) => sum + c.count, 0);

  const monthsHtml = weeks.map((_, i) => {
    const label = months.find(m => m.index === i);
    return `<span class="month-label" style="width:14px;">${label ? label.text : ''}</span>`;
  }).join('');

  const weeksHtml = weeks.map(week => {
    const daysHtml = week.map(day => {
      const level = levelForCount(day.count);
      return `<div class="day" style="background:var(--l${level})" data-date="${day.date}" data-count="${day.count}"></div>`;
    }).join('');
    return `<div class="week">${daysHtml}</div>`;
  }).join('');

  contentEl.innerHTML = `
    <div class="scroll-wrap">
      <div class="months">${monthsHtml}</div>
      <div class="grid-area">
        <div class="day-labels"><span>Mon</span><span>Wed</span><span>Fri</span></div>
        <div class="weeks">${weeksHtml}</div>
      </div>
    </div>
    <div style="margin-top:10px; font-size:13px; color:var(--muted);">${total} contributions in the last year</div>
  `;

  footerEl.style.display = 'flex';
  const ts = new Date(fetchedAt);
  updatedTextEl.textContent = `Updated ${ts.toLocaleString()}${fromCache ? ' (cached)' : ' (live)'}`;

  contentEl.querySelectorAll('.day').forEach(el => {
    el.addEventListener('mousemove', (e) => {
      const date = el.getAttribute('data-date');
      const count = el.getAttribute('data-count');
      tooltip.textContent = `${count} contribution${count === '1' ? '' : 's'} on ${formatDate(date)}`;
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY + 12) + 'px';
      tooltip.style.opacity = '1';
    });
    el.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });
  });
}

async function load(forceRefresh) {
  const username = usernameInput.value.trim();
  if (!username) return;

  contentEl.innerHTML = `<div class="status">Loading contribution data for ${username}…</div>`;
  footerEl.style.display = 'none';

  try {
    const { data, fromCache, fetchedAt } = await fetchContributions(username, forceRefresh);
    render(username, data.contributions, fetchedAt, fromCache);
  } catch (err) {
    contentEl.innerHTML = `<div class="status error">${err.message}</div>`;
  }
}

refreshBtn.addEventListener('click', () => load(true));
usernameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') load(true);
});

load(false);
</script>

</body>
</html>
